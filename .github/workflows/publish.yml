name: Publish to main

# When an automated run pushes a `claude/*` branch, fast-forward `main` to it so
# GitHub Pages (served from main) rebuilds and the episode goes live — with no
# manual merge. This job runs on GitHub's servers, outside the Claude git proxy,
# so it can push to `main` using the built-in GITHUB_TOKEN.

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write

# Never let two publish runs race each other onto main.
concurrency:
  group: publish-to-main
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fast-forward main to the pushed branch
        run: |
          set -euo pipefail
          echo "Triggered by $GITHUB_REF_NAME @ $GITHUB_SHA"
          git fetch origin +refs/heads/main:refs/remotes/origin/main

          # Fast-forward when main is behind. If main moves during the push,
          # refresh it and distinguish a superseded run from true divergence.
          if git merge-base --is-ancestor origin/main "$GITHUB_SHA"; then
            if git push origin "$GITHUB_SHA:refs/heads/main"; then
              echo "main fast-forwarded to $GITHUB_SHA — GitHub Pages will republish."
              exit 0
            fi
            git fetch origin +refs/heads/main:refs/remotes/origin/main
          fi

          # A delayed run may be an ancestor of a main branch that has already
          # advanced. That is a successful no-op, not a merge conflict.
          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::notice::main already contains or supersedes $GITHUB_SHA; nothing to do."
            exit 0
          fi

          echo "::error::main and $GITHUB_SHA have genuinely diverged. Refusing to overwrite main automatically — merge this branch manually."
          exit 1
